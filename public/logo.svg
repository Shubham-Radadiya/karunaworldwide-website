<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 280 72" fill="none" aria-label="Karuna Worldwide LLP">
  <!-- Logo: symmetric network - central core (5), inner 8, outer 16 = 29 nodes, 4-fold symmetry. Navy #1A2B44 -->
  <g transform="translate(32, 36)">
    <defs>
      <g id="node"><circle r="1.6" fill="#1A2B44"/></g>
    </defs>
    <!-- Scale so icon fits ~56px; design in 44-unit radius space -->
    <g transform="scale(0.65)">
      <!-- CENTRAL CORE: 1 center + 4 diamond (square) nodes -->
      <use xlink:href="#node" x="0" y="0"/>
      <use xlink:href="#node" x="0" y="-6"/>
      <use xlink:href="#node" x="6" y="0"/>
      <use xlink:href="#node" x="0" y="6"/>
      <use xlink:href="#node" x="-6" y="0"/>
      <line x1="0" y1="0" x2="0" y2="-6" stroke="#1A2B44" stroke-width="1"/>
      <line x1="0" y1="0" x2="6" y2="0" stroke="#1A2B44" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1A2B44" stroke-width="1"/>
      <line x1="0" y1="0" x2="-6" y2="0" stroke="#1A2B44" stroke-width="1"/>
      <line x1="0" y1="-6" x2="6" y2="0" stroke="#1A2B44" stroke-width="1"/>
      <line x1="6" y1="0" x2="0" y2="6" stroke="#1A2B44" stroke-width="1"/>
      <line x1="0" y1="6" x2="-6" y2="0" stroke="#1A2B44" stroke-width="1"/>
      <line x1="-6" y1="0" x2="0" y2="-6" stroke="#1A2B44" stroke-width="1"/>
      <!-- INNER 8: corners (diagonals) + midpoints (cardinals) at r≈14 -->
      <!-- corners: 45,135,225,315° → (9.9,9.9), (-9.9,9.9), (-9.9,-9.9), (9.9,-9.9) -->
      <use xlink:href="#node" x="9.9" y="-9.9"/>
      <use xlink:href="#node" x="9.9" y="9.9"/>
      <use xlink:href="#node" x="-9.9" y="9.9"/>
      <use xlink:href="#node" x="-9.9" y="-9.9"/>
      <!-- midpoints: 0,90,180,270° → (14,0), (0,14), (-14,0), (0,-14) -->
      <use xlink:href="#node" x="14" y="0"/>
      <use xlink:href="#node" x="0" y="14"/>
      <use xlink:href="#node" x="-14" y="0"/>
      <use xlink:href="#node" x="0" y="-14"/>
      <!-- Inner: center diamond to corners (each corner to 2 diamond nodes) -->
      <line x1="6" y1="0" x2="9.9" y2="-9.9" stroke="#1A2B44" stroke-width="1"/>
      <line x1="0" y1="-6" x2="9.9" y2="-9.9" stroke="#1A2B44" stroke-width="1"/>
      <line x1="6" y1="0" x2="9.9" y2="9.9" stroke="#1A2B44" stroke-width="1"/>
      <line x1="0" y1="6" x2="9.9" y2="9.9" stroke="#1A2B44" stroke-width="1"/>
      <line x1="0" y1="6" x2="-9.9" y2="9.9" stroke="#1A2B44" stroke-width="1"/>
      <line x1="-6" y1="0" x2="-9.9" y2="9.9" stroke="#1A2B44" stroke-width="1"/>
      <line x1="-6" y1="0" x2="-9.9" y2="-9.9" stroke="#1A2B44" stroke-width="1"/>
      <line x1="0" y1="-6" x2="-9.9" y2="-9.9" stroke="#1A2B44" stroke-width="1"/>
      <!-- Inner: midpoints to 1 diamond node + 2 adjacent corners -->
      <line x1="14" y1="0" x2="6" y2="0" stroke="#1A2B44" stroke-width="1"/>
      <line x1="14" y1="0" x2="9.9" y2="-9.9" stroke="#1A2B44" stroke-width="1"/>
      <line x1="14" y1="0" x2="9.9" y2="9.9" stroke="#1A2B44" stroke-width="1"/>
      <line x1="0" y1="14" x2="0" y2="6" stroke="#1A2B44" stroke-width="1"/>
      <line x1="0" y1="14" x2="9.9" y2="9.9" stroke="#1A2B44" stroke-width="1"/>
      <line x1="0" y1="14" x2="-9.9" y2="9.9" stroke="#1A2B44" stroke-width="1"/>
      <line x1="-14" y1="0" x2="-6" y2="0" stroke="#1A2B44" stroke-width="1"/>
      <line x1="-14" y1="0" x2="-9.9" y2="9.9" stroke="#1A2B44" stroke-width="1"/>
      <line x1="-14" y1="0" x2="-9.9" y2="-9.9" stroke="#1A2B44" stroke-width="1"/>
      <line x1="0" y1="-14" x2="0" y2="-6" stroke="#1A2B44" stroke-width="1"/>
      <line x1="0" y1="-14" x2="9.9" y2="-9.9" stroke="#1A2B44" stroke-width="1"/>
      <line x1="0" y1="-14" x2="-9.9" y2="-9.9" stroke="#1A2B44" stroke-width="1"/>
      <!-- Inner: connect corners to each other (octagon) -->
      <line x1="9.9" y1="-9.9" x2="9.9" y2="9.9" stroke="#1A2B44" stroke-width="0.9"/>
      <line x1="9.9" y1="9.9" x2="-9.9" y2="9.9" stroke="#1A2B44" stroke-width="0.9"/>
      <line x1="-9.9" y1="9.9" x2="-9.9" y2="-9.9" stroke="#1A2B44" stroke-width="0.9"/>
      <line x1="-9.9" y1="-9.9" x2="9.9" y2="-9.9" stroke="#1A2B44" stroke-width="0.9"/>
      <!-- OUTER 16: from each of 8 inner nodes. Corners→triangle (2 outer + edge); Midpoints→V (2 outer, no edge). r=22 -->
      <!-- Corner 9.9,-9.9 (top-right): triangle → outer at ~(18, -18) and (18, -2) and connect them -->
      <use xlink:href="#node" x="18" y="-18"/>
      <use xlink:href="#node" x="18" y="-2"/>
      <line x1="9.9" y1="-9.9" x2="18" y2="-18" stroke="#1A2B44" stroke-width="1"/>
      <line x1="9.9" y1="-9.9" x2="18" y2="-2" stroke="#1A2B44" stroke-width="1"/>
      <line x1="18" y1="-18" x2="18" y2="-2" stroke="#1A2B44" stroke-width="0.9"/>
      <!-- Corner 9.9,9.9 -->
      <use xlink:href="#node" x="18" y="2"/>
      <use xlink:href="#node" x="18" y="18"/>
      <line x1="9.9" y1="9.9" x2="18" y2="2" stroke="#1A2B44" stroke-width="1"/>
      <line x1="9.9" y1="9.9" x2="18" y2="18" stroke="#1A2B44" stroke-width="1"/>
      <line x1="18" y1="2" x2="18" y2="18" stroke="#1A2B44" stroke-width="0.9"/>
      <!-- Corner -9.9,9.9 -->
      <use xlink:href="#node" x="-18" y="2"/>
      <use xlink:href="#node" x="-18" y="18"/>
      <line x1="-9.9" y1="9.9" x2="-18" y2="2" stroke="#1A2B44" stroke-width="1"/>
      <line x1="-9.9" y1="9.9" x2="-18" y2="18" stroke="#1A2B44" stroke-width="1"/>
      <line x1="-18" y1="2" x2="-18" y2="18" stroke="#1A2B44" stroke-width="0.9"/>
      <!-- Corner -9.9,-9.9 -->
      <use xlink:href="#node" x="-18" y="-18"/>
      <use xlink:href="#node" x="-18" y="-2"/>
      <line x1="-9.9" y1="-9.9" x2="-18" y2="-18" stroke="#1A2B44" stroke-width="1"/>
      <line x1="-9.9" y1="-9.9" x2="-18" y2="-2" stroke="#1A2B44" stroke-width="1"/>
      <line x1="-18" y1="-18" x2="-18" y2="-2" stroke="#1A2B44" stroke-width="0.9"/>
      <!-- Midpoint 14,0: V (2 outer, no line between them) -->
      <use xlink:href="#node" x="22" y="-4"/>
      <use xlink:href="#node" x="22" y="4"/>
      <line x1="14" y1="0" x2="22" y2="-4" stroke="#1A2B44" stroke-width="1"/>
      <line x1="14" y1="0" x2="22" y2="4" stroke="#1A2B44" stroke-width="1"/>
      <!-- Midpoint 0,14 -->
      <use xlink:href="#node" x="4" y="22"/>
      <use xlink:href="#node" x="-4" y="22"/>
      <line x1="0" y1="14" x2="4" y2="22" stroke="#1A2B44" stroke-width="1"/>
      <line x1="0" y1="14" x2="-4" y2="22" stroke="#1A2B44" stroke-width="1"/>
      <!-- Midpoint -14,0 -->
      <use xlink:href="#node" x="-22" y="4"/>
      <use xlink:href="#node" x="-22" y="-4"/>
      <line x1="-14" y1="0" x2="-22" y2="4" stroke="#1A2B44" stroke-width="1"/>
      <line x1="-14" y1="0" x2="-22" y2="-4" stroke="#1A2B44" stroke-width="1"/>
      <!-- Midpoint 0,-14 -->
      <use xlink:href="#node" x="-4" y="-22"/>
      <use xlink:href="#node" x="4" y="-22"/>
      <line x1="0" y1="-14" x2="-4" y2="-22" stroke="#1A2B44" stroke-width="1"/>
      <line x1="0" y1="-14" x2="4" y2="-22" stroke="#1A2B44" stroke-width="1"/>
      <!-- Adjacent outer connections (web) -->
      <line x1="18" y1="-2" x2="22" y2="-4" stroke="#1A2B44" stroke-width="0.85"/>
      <line x1="18" y1="2" x2="22" y2="4" stroke="#1A2B44" stroke-width="0.85"/>
      <line x1="18" y1="2" x2="4" y2="22" stroke="#1A2B44" stroke-width="0.85"/>
      <line x1="18" y1="18" x2="4" y2="22" stroke="#1A2B44" stroke-width="0.85"/>
      <line x1="-4" y1="22" x2="-18" y2="18" stroke="#1A2B44" stroke-width="0.85"/>
      <line x1="-4" y1="22" x2="-18" y2="2" stroke="#1A2B44" stroke-width="0.85"/>
      <line x1="-22" y1="4" x2="-18" y2="2" stroke="#1A2B44" stroke-width="0.85"/>
      <line x1="-22" y1="-4" x2="-18" y2="-2" stroke="#1A2B44" stroke-width="0.85"/>
      <line x1="-18" y1="-2" x2="-4" y2="-22" stroke="#1A2B44" stroke-width="0.85"/>
      <line x1="-18" y1="-18" x2="-4" y2="-22" stroke="#1A2B44" stroke-width="0.85"/>
      <line x1="4" y1="-22" x2="18" y2="-18" stroke="#1A2B44" stroke-width="0.85"/>
      <line x1="4" y1="-22" x2="18" y2="-2" stroke="#1A2B44" stroke-width="0.85"/>
    </g>
  </g>
  <text x="72" y="38" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1A2B44" letter-spacing="0.06em">KARUNA</text>
  <text x="72" y="56" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="500" fill="#1A2B44" letter-spacing="0.05em">WORLDWIDE LLP</text>
</svg>
